<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2B Communication | Final Speed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.cdnfonts.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #f1f5f9; }
        .ui-panel { max-width: 900px; margin: 10px auto; padding: 20px; background: white; border-radius: 20px; border-top: 6px solid #4f46e5; }
        @media print {
            .no-print { display: none !important; }
            #print-zone { display: block !important; }
            .page { page-break-after: always; position: relative; width: 10in; height: 7in; margin: 0 auto; overflow: hidden; }
            .bg-template { position: absolute; top: 0; left: 0; width: 10in; height: 7in; z-index: 1; }
            .plate-info { position: absolute; color: black; z-index: 10; left: 315px; width: 450px; text-align: left; font-size: 27pt !important; }
            .p-owner { top: 235px; } .p-parent { top: 285px; } .p-hld { top: 335px; font-weight: bold; } 
            .p-ward { top: 385px; } .p-road { top: 435px; line-height: 1.1; } 
            .p-qr { position: absolute; z-index: 20; left: 678px; top: 220px; width: 185px; }
        }
        #print-zone { display: none; }
        #data-list { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body onload="initApp()">

<div id="main-content" class="hidden no-print ui-panel shadow-xl">
    <div class="flex justify-between items-center mb-4 border-b pb-3">
        <h2 class="text-xl font-bold text-indigo-600">2B Communication</h2>
        <button onclick="logout()" class="text-red-500 text-[10px] font-bold border border-red-100 px-3 py-1 rounded-full">লগআউট</button>
    </div>

    <div id="admin-header" class="hidden bg-slate-900 p-4 rounded-2xl text-white mb-6">
        <div class="flex justify-between items-center">
            <span class="text-xs text-indigo-400 font-bold uppercase">Admin Panel</span>
            <div class="bg-indigo-600 px-3 py-1 rounded-lg text-xs">Total: <span id="total-count">0</span></div>
        </div>
        <div id="stats" class="grid grid-cols-4 gap-2 mt-3"></div>
    </div>

    <div class="bg-slate-50 p-4 rounded-2xl border mb-6">
        <input type="hidden" id="edit-id" value="">
        <div class="grid grid-cols-2 gap-3">
            <input type="text" id="owner" placeholder="মালিক" class="p-2.5 border rounded-lg outline-none text-sm">
            <input type="text" id="parent" placeholder="পিতা/স্বামী" class="p-2.5 border rounded-lg outline-none text-sm">
            <input type="text" id="hld" placeholder="হোল্ডিং নং" class="p-2.5 border rounded-lg outline-none text-sm">
            <input type="text" id="ward" placeholder="ওয়ার্ড নং" class="p-2.5 border rounded-lg outline-none text-sm">
            <input type="text" id="road" placeholder="রাস্তা/মহল্লা" class="col-span-2 p-2.5 border rounded-lg outline-none text-sm">
        </div>
        <button id="save-btn" onclick="saveData()" class="w-full mt-3 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all">ডাটা সেভ করুন</button>
    </div>

    <div id="admin-actions" class="hidden grid grid-cols-2 gap-3 mb-6">
        <button id="zip-btn" onclick="downloadAll()" class="bg-emerald-500 text-white py-3 rounded-xl font-bold text-xs">📂 সব SVG ডাউনলোড (ZIP)</button>
        <button onclick="printAll()" class="bg-blue-600 text-white py-3 rounded-xl font-bold text-xs">🖨️ সব প্রিন্ট করুন</button>
    </div>

    <input type="text" id="search" onkeyup="renderList()" placeholder="খুঁজুন..." class="w-full p-3 mb-3 border rounded-xl bg-white outline-none text-sm shadow-inner">

    <div id="data-list" class="space-y-2"></div>
</div>

<div id="print-zone"></div>

<script>
    const firebaseConfig = { databaseURL: "https://b-system-73a7f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let db = []; let currentUser = sessionStorage.getItem('logged_2b_user');
    let plateTemplate = localStorage.getItem('2b_plate_v3') || "";

    function initApp() {
        database.ref('users').on('value', (snap) => {
            const users = snap.val() || { "admin": { pass: "forhad786" } };
            if (currentUser && users[currentUser]) {
                document.getElementById('main-content').classList.remove('hidden');
                if(currentUser === 'admin') {
                    document.getElementById('admin-header').classList.remove('hidden');
                    document.getElementById('admin-actions').classList.remove('hidden');
                }
                loadData();
            } else {
                const id = prompt("User ID:"); const ps = prompt("Password:");
                if (users[id] && users[id].pass === ps) { sessionStorage.setItem('logged_2b_user', id); location.reload(); }
            }
        });
    }

    function loadData() {
        database.ref('entries').on('value', (snap) => {
            const val = snap.val();
            db = val ? Object.keys(val).map(id => ({...val[id], id})) : [];
            document.getElementById('total-count').innerText = db.length;
            renderList(); renderStats();
        });
    }

    function renderList() {
        const container = document.getElementById('data-list');
        const search = document.getElementById('search').value.toLowerCase();
        let filtered = (currentUser === 'admin') ? db : db.filter(d => d.user === currentUser);
        if(search) filtered = filtered.filter(d => d.owner.toLowerCase().includes(search) || d.hld.includes(search));
        
        // Fast Render (No QR loading here)
        container.innerHTML = filtered.slice().reverse().map(d => `
            <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                <div><h4 class="font-bold text-sm">${d.owner} <span class="text-indigo-500">#${d.hld}</span></h4><p class="text-[9px] text-slate-400 uppercase">${d.user} | ${d.date}</p></div>
                <div class="flex gap-1"><button onclick="editEntry('${d.id}')" class="bg-amber-50 text-amber-600 px-3 py-1 rounded text-[10px] font-bold">এডিট</button>
                ${currentUser==='admin' ? `<button onclick="deleteEntry('${d.id}')" class="text-red-400 p-1">🗑️</button>` : ''}</div></div>
        `).join('');
    }

    function renderStats() {
        const grid = document.getElementById('stats'); if(!grid) return;
        const counts = {}; db.forEach(d => counts[d.user] = (counts[d.user] || 0) + 1);
        grid.innerHTML = Object.keys(counts).map(u => `<div class="bg-slate-800 p-2 rounded-lg text-center border border-slate-700"><p class="text-[8px] text-indigo-300 truncate">${u}</p><p class="text-xs font-bold">${counts[u]}</p></div>`).join('');
    }

    // ZIP ডাউনলোড - সব ফাইল একসাথে (ফোল্ডার ছাড়া)
    async function downloadAll() {
        const btn = document.getElementById('zip-btn'); btn.disabled = true; btn.innerText = "অপেক্ষা করুন...";
        const zip = new JSZip();
        for (let i = 0; i < db.length; i++) {
            const d = db[i];
            const qrInfo = `মালিক: ${d.owner}\nপিতা/স্বামী: ${d.parent}\nহোল্ডিং নং: ${d.hld}\nওয়ার্ড নং: ${d.ward}\nরাস্তা: ${d.road}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrInfo)}`;
            try {
                const res = await fetch(qrUrl);
                const blob = await res.blob();
                const b64 = await new Promise(r => {const rd = new FileReader(); rd.onloadend = () => r(rd.result); rd.readAsDataURL(blob);});
                const svg = `<?xml version="1.0" encoding="UTF-8"?><svg width="85.5mm" height="54mm" viewBox="0 0 85.5 54" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><rect width="85.5" height="54" fill="white"/><text x="25" y="21.5" font-family="Arial" font-size="3.2" font-weight="bold" fill="black">${d.owner}</text><text x="25" y="26.2" font-family="Arial" font-size="3" fill="black">${d.parent}</text><text x="25" y="31.0" font-family="Arial" font-size="3.2" font-weight="bold" fill="white">${d.hld}</text><text x="25" y="36.0" font-family="Arial" font-size="3" fill="black">${d.ward}</text><text x="25" y="41.3" font-family="Arial" font-size="2.8" fill="black">${d.road}</text><image xlink:href="${b64}" x="60" y="29" height="22" width="22"/></svg>`;
                
                // ফাইলের নাম থেকে স্পেশাল ক্যারেক্টার মুছে ফেলা হচ্ছে
                const fileName = `ID_${d.hld.replace(/[^a-zA-Z0-9]/g, '_')}.svg`;
                zip.file(fileName, svg);
                btn.innerText = `প্রসেসিং: ${i+1}/${db.length}`;
            } catch(e) {}
        }
        zip.generateAsync({type: "blob"}).then(content => {
            const a = document.createElement("a"); a.href = URL.createObjectURL(content); a.download = "2B_Final_IDs.zip"; a.click();
            btn.disabled = false; btn.innerText = "📂 সব SVG ডাউনলোড (ZIP)";
        });
    }

    function printAll() {
        const zone = document.getElementById('print-zone');
        zone.innerHTML = "<h2 style='text-align:center; padding-top:100px;'>প্রিন্ট রেডি হচ্ছে...</h2>";
        setTimeout(() => {
            zone.innerHTML = db.map(d => {
                const qrInfo = `মালিক: ${d.owner}\nপিতা/স্বামী: ${d.parent}\nহোল্ডিং নং: ${d.hld}\nওয়ার্ড নং: ${d.ward}\nরাস্তা: ${d.road}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrInfo)}`;
                return `<div class="page"><img src="${plateTemplate}" class="bg-template"><div class="plate-info p-owner">${d.owner}</div><div class="plate-info p-parent">${d.parent}</div><div class="plate-info p-hld">${d.hld}</div><div class="plate-info p-ward">${d.ward}</div><div class="plate-info p-road">${d.road}</div><img src="${qrUrl}" class="p-qr"></div>`;
            }).join('');
            window.print();
        }, 1000);
    }

    function saveData() {
        const owner = document.getElementById('owner').value.trim();
        const hld = document.getElementById('hld').value.trim();
        const editId = document.getElementById('edit-id').value;
        if(!owner || !hld) return alert("তথ্য দিন");
        const entry = { owner, parent: document.getElementById('parent').value, hld, ward: document.getElementById('ward').value, road: document.getElementById('road').value, user: currentUser, date: new Date().toLocaleDateString('bn-BD') };
        if(editId) database.ref('entries/' + editId).update(entry); else database.ref('entries').push(entry);
        ['owner','parent','hld','ward','road','edit-id'].forEach(i => document.getElementById(i).value="");
        document.getElementById('save-btn').innerText = "ডাটা সেভ করুন";
    }

    function deleteEntry(id) { if(confirm("মুছবেন?")) database.ref('entries/' + id).remove(); }
    function editEntry(id) {
        const d = db.find(i => i.id === id);
        ['owner','parent','hld','ward','road'].forEach(i => document.getElementById(i).value = d[i]);
        document.getElementById('edit-id').value = id;
        document.getElementById('save-btn').innerText = "আপডেট করুন";
        window.scrollTo({top:0, behavior:'smooth'});
    }
    function logout() { sessionStorage.removeItem('logged_2b_user'); location.reload(); }
</script>
</body>
</html>
