<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2B Communication | Master V16 Final Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.cdnfonts.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .input-style { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; transition: all 0.3s; }
        .input-style:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @media print {
            .no-print { display: none !important; }
            #print-zone { display: block !important; background: white !important; }
            .page { page-break-after: always; position: relative; width: 10in; height: 7in; margin: 0; overflow: hidden; background: white !important; }
            .bg-template { position: absolute; top: 0; left: 0; width: 10in; height: 7in; z-index: 1; }
            .plate-info { position: absolute; z-index: 10; left: 315px; width: 360px; text-align: left; font-size: 27pt; color: black; font-weight: bold; white-space: nowrap; display: flex; align-items: center; }
            .auto-fit { display: inline-block; transform-origin: left center; }
            .p-owner { top: 235px; } .p-parent { top: 285px; } .p-hld { top: 335px; }
            .p-ward { top: 385px; } .p-road { top: 435px; }
            .p-qr { position: absolute; z-index: 20; left: 678px; top: 220px; width: 185px; }
        }
        #print-zone { display: none; }
        #login-screen { background: radial-gradient(circle at top right, #1e1b4b, #0f172a); }
    </style>
</head>
<body onload="initApp()">

<div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-md p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-400 tracking-tight">2B Communication</h1>
            <p class="text-slate-400 text-sm mt-2">সিস্টেমে প্রবেশ করতে লগইন করুন</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1 ml-1">ইউজার আইডি</label>
                <input type="text" id="login-id" class="input-style w-full p-3 rounded-lg outline-none" placeholder="ID লিখুন...">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1 ml-1">পাসওয়ার্ড</label>
                <input type="password" id="login-pass" class="input-style w-full p-3 rounded-lg outline-none" placeholder="পাসওয়ার্ড (ভিউয়ার হলে খালি রাখুন)">
            </div>
            <button onclick="handleLogin()" class="btn-primary w-full py-3 rounded-lg font-bold text-white shadow-lg mt-4">প্রবেশ করুন</button>
        </div>
    </div>
</div>

<div id="main-content" class="hidden no-print max-w-5xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8 glass-card p-4">
        <div><h1 class="text-2xl font-black text-indigo-400">2B <span class="text-white">Communication</span></h1></div>
        <div class="flex gap-4 items-center">
            <div class="text-right">
                <span id="user-display" class="block text-[10px] font-bold text-indigo-300 uppercase tracking-widest"></span>
                <button onclick="logout()" class="text-red-400 text-[10px] font-bold hover:underline">লগআউট</button>
            </div>
        </div>
    </div>

    <div id="stats-panel" class="space-y-6 mb-8">
        <div class="glass-card p-6 border-l-4 border-indigo-500 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-black text-indigo-300 uppercase tracking-tighter">ডাটা রিপোর্ট</h2>
                <div class="bg-indigo-600/20 text-indigo-400 px-4 py-1 rounded-full text-xs font-bold border border-indigo-500/30">মোট: <span id="total-count">0</span></div>
            </div>
            <div id="user-stats" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
            
            <div id="admin-user-controls" class="hidden mt-6 pt-6 border-t border-slate-700/50 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input type="text" id="new-user" class="input-style rounded-lg text-sm" placeholder="আইডি">
                    <input type="text" id="new-pass" class="input-style rounded-lg text-sm" placeholder="পাসওয়ার্ড">
                    <button onclick="createUser()" class="btn-primary rounded-lg text-xs font-bold py-3 uppercase">ইউজার আপডেট</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 border-dashed text-center">
                        <p class="text-[10px] mb-2 text-indigo-300 font-bold uppercase">ID Image</p>
                        <input type="file" onchange="loadImg(this, 'id')" class="text-[10px] w-full cursor-pointer">
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 border-dashed text-center">
                        <p class="text-[10px] mb-2 text-indigo-300 font-bold uppercase">Plate Image</p>
                        <input type="file" onchange="loadImg(this, 'plate')" class="text-[10px] w-full cursor-pointer">
                    </div>
                </div>
                <button onclick="deleteAllData()" class="w-full bg-red-500/10 text-red-500 border border-red-500/30 py-2 text-[10px] font-bold rounded-lg transition-all">সব ডাটা মুছুন (নিরাপদ)</button>
            </div>
        </div>
    </div>

    <div id="entry-form-section" class="hidden glass-card p-8 mb-8 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="hidden" id="edit-id">
            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">মালিকের নাম</label><input type="text" id="owner" class="input-style p-3 rounded-lg"></div>
            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">পিতা/স্বামীর নাম</label><input type="text" id="parent" class="input-style p-3 rounded-lg"></div>
            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">হোল্ডিং নং</label><input type="text" id="hld" class="input-style p-3 rounded-lg"></div>
            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">ওয়ার্ড নং</label><input type="text" id="ward" class="input-style p-3 rounded-lg"></div>
            <div class="md:col-span-2 space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">ঠিকানা</label><textarea id="road" class="input-style p-3 rounded-lg h-16"></textarea></div>
        </div>
        <div class="flex gap-3 mt-6">
            <button id="save-btn" onclick="saveData()" class="flex-1 btn-primary py-4 rounded-xl font-black text-sm uppercase">ডাটা সেভ করুন</button>
            <button id="cancel-btn" onclick="resetForm()" class="hidden bg-slate-700 px-8 rounded-xl font-bold">বাতিল</button>
        </div>
    </div>

    <div id="admin-btns" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <button onclick="buildZip()" class="glass-card hover:bg-slate-800 py-4 rounded-xl font-bold">📂 SVG জিপ ডাউনলোড</button>
        <button onclick="window.print()" class="bg-white text-slate-900 py-4 rounded-xl font-black shadow-xl">🖨️ প্রিন্ট ভিউ (10x7)</button>
    </div>

    <div id="list" class="space-y-2 max-h-[500px] overflow-y-auto pr-2"></div>
</div>

<div id="print-zone"></div>

<script>
    const firebaseConfig = { databaseURL: "https://b-system-73a7f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let entries = []; let usersData = {}; 
    let currentUser = sessionStorage.getItem('user_2b');
    let userRole = sessionStorage.getItem('user_role') || 'viewer';
    let idImg = ""; let plateImg = "";

    function handleLogin() {
        const id = document.getElementById('login-id').value.toLowerCase().trim();
        const p = document.getElementById('login-pass').value.trim();
        if (id && usersData[id]) {
            if (p === usersData[id].pass) {
                if(usersData[id].status === 'blocked') return alert("Blocked ID!");
                sessionStorage.setItem('user_2b', id);
                sessionStorage.setItem('user_role', id === 'admin' ? 'admin' : 'user');
                location.reload();
            } else if (p === "") {
                sessionStorage.setItem('user_2b', id); sessionStorage.setItem('user_role', 'viewer');
                location.reload();
            } else { alert("ভুল পাসওয়ার্ড!"); }
        } else { alert("আইডি পাওয়া যায়নি!"); }
    }

    function initApp() {
        database.ref('users').on('value', (s) => {
            usersData = s.val() || { "admin": { pass: "forhad786", status: "active" } };
            if (currentUser) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = `${currentUser} (${userRole})`;
                if(userRole === 'admin') {
                    document.getElementById('admin-user-controls').classList.remove('hidden');
                    document.getElementById('admin-btns').classList.remove('hidden');
                    document.getElementById('entry-form-section').classList.remove('hidden');
                } else if (userRole === 'user') {
                    document.getElementById('entry-form-section').classList.remove('hidden');
                }
                syncData();
            }
        });
    }

    function syncData() {
        database.ref('entries').on('value', (s) => {
            const val = s.val();
            entries = val ? Object.keys(val).map(id => ({...val[id], id})) : [];
            renderStats(); 
            if(userRole !== 'viewer') renderList(); 
            renderPrint();
        });
    }

    function renderStats() {
        const counts = {}; entries.forEach(e => counts[e.user] = (counts[e.user] || 0) + 1);
        document.getElementById('total-count').innerText = entries.length;
        let html = "";
        Object.keys(usersData).forEach(u => {
            html += `<div class="bg-slate-900/80 p-3 rounded-xl flex justify-between items-center border border-slate-800">
                <span class="text-[10px] font-bold uppercase text-indigo-300">${u} (${counts[u] || 0})</span>
                ${userRole === 'admin' && u !== 'admin' ? `<button onclick="delUser('${u}')" class="text-red-500 font-bold text-lg">×</button>` : ''}
            </div>`;
        });
        document.getElementById('user-stats').innerHTML = html;
    }

    function renderList() {
        const list = (userRole === 'admin') ? entries : entries.filter(e => e.user === currentUser);
        document.getElementById('list').innerHTML = list.slice().reverse().map(e => `
            <div class="glass-card p-4 flex justify-between items-center mb-2">
                <div class="flex-1">
                    <p class="font-bold text-indigo-300 text-sm">${e.owner}</p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">হোল্ডিং: ${e.hld} | ইউজার: ${e.user}</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="editData('${e.id}')" class="text-indigo-400 text-[10px] font-black uppercase">ইডিট</button>
                    ${userRole === 'admin' ? `<button onclick="database.ref('entries/'+'${e.id}').remove()" class="text-red-500">×</button>` : ''}
                </div>
            </div>`).join('');
    }

    function saveData() {
        const data = { 
            owner: document.getElementById('owner').value, 
            parent: document.getElementById('parent').value, 
            hld: document.getElementById('hld').value, 
            ward: document.getElementById('ward').value, 
            road: document.getElementById('road').value, 
            user: currentUser 
        };
        if(!data.owner || !data.hld) return alert("তথ্য দিন!");
        const eid = document.getElementById('edit-id').value;
        if(eid) database.ref('entries/'+eid).update(data); else database.ref('entries').push(data);
        resetForm();
    }

    // QR Code Fixed Data String
    function getQrText(d) {
        return `নাম: ${d.owner}\nপিতা/স্বামী: ${d.parent}\nহোল্ডিং: ${d.hld}\nওয়ার্ড: ${d.ward}\nঠিকানা: ${d.road}`;
    }

    function getSvgText(text, x, y, maxWidth, fontSize, isBold=false, color="black") {
        let estW = text.length * (fontSize * 0.55);
        let sX = estW > maxWidth ? (maxWidth / estW) : 1;
        return `<text x="${x}" y="${y}" font-family="Arial" font-size="${fontSize}" ${isBold?'font-weight="bold"':''} fill="${color}" style="transform: scale(${sX}, 1); transform-origin: ${x}px ${y}px;">${text}</text>`;
    }

    async function buildZip() {
        if(!idImg) return alert("ID ব্যাকগ্রাউন্ড দিন");
        const zip = new JSZip();
        for(let d of entries) {
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(getQrText(d))}`;
            const qB64 = await new Promise(ok => { fetch(qrUrl).then(r => r.blob()).then(b => { const rd = new FileReader(); rd.onloadend = () => ok(rd.result); rd.readAsDataURL(b); }); });
            const svg = `<?xml version="1.0" encoding="UTF-8"?><svg width="85.5mm" height="54mm" viewBox="0 0 85.5 54" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                <image xlink:href="${idImg}" x="0" y="0" width="85.5" height="54" preserveAspectRatio="none"/>
                ${getSvgText(d.owner, 25.5, 21.5, 36, 3.2, true)}
                ${getSvgText(d.parent, 25.5, 26.4, 36, 3.2)}
                ${getSvgText(d.hld, 25.5, 31.3, 36, 3.2, true, "white")}
                ${getSvgText(d.ward, 25.5, 36.2, 36, 3.2)}
                ${getSvgText(d.road, 25.5, 41.1, 36, 3.2)}
                <image xlink:href="${qB64}" x="63.5" y="28" height="20" width="20"/>
            </svg>`;
            zip.file(`${d.owner}_${d.hld.replace(/\//g,'_')}.svg`, svg);
        }
        zip.generateAsync({type:"blob"}).then(c => { const a = document.createElement('a'); a.href = URL.createObjectURL(c); a.download = "2B_IDs.zip"; a.click(); });
    }

    function renderPrint() {
        if(!plateImg) return;
        document.getElementById('print-zone').innerHTML = entries.map(e => {
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(getQrText(e))}`;
            return `<div class="page"><img src="${plateImg}" class="bg-template">
                <div class="plate-info p-owner"><span class="auto-fit">${e.owner}</span></div>
                <div class="plate-info p-parent"><span class="auto-fit">${e.parent}</span></div>
                <div class="plate-info p-hld"><span class="auto-fit">${e.hld}</span></div>
                <div class="plate-info p-ward"><span class="auto-fit">${e.ward}</span></div>
                <div class="plate-info p-road"><span class="auto-fit">${e.road}</span></div>
                <img src="${qrUrl}" class="p-qr">
            </div>`;
        }).join('');
        setTimeout(() => { document.querySelectorAll('.plate-info').forEach(b => { const s = b.querySelector('.auto-fit'); if(s) { const sc = Math.min(1, b.offsetWidth / s.offsetWidth); s.style.transform = `scale(${sc}, 1)`; } }); }, 500);
    }

    function logout() { sessionStorage.clear(); location.reload(); }
    function resetForm() { document.getElementById('edit-id').value = ""; ['owner','parent','hld','ward','road'].forEach(k => document.getElementById(k).value = ""); document.getElementById('save-btn').innerText = "ডাটা সেভ করুন"; document.getElementById('cancel-btn').classList.add('hidden'); }
    function delUser(u) { if(confirm("ডিলিট?")) database.ref('users/'+u).remove(); }
    function deleteAllData() { if(confirm("সব ডাটা মুছবেন?")) database.ref('entries').remove(); }
    function createUser() { const u = document.getElementById('new-user').value.toLowerCase().trim(); const p = document.getElementById('new-pass').value.trim(); if(u && p) { database.ref('users/'+u).update({pass:p, status:'active'}); alert("Done!"); } }
    function loadImg(input, type) { if (input.files && input.files[0]) { const rd = new FileReader(); rd.onload = (e) => { if(type === 'id') idImg = e.target.result; else { plateImg = e.target.result; renderPrint(); } }; rd.readAsDataURL(input.files[0]); } }
    function editData(id) { const d = entries.find(e => e.id === id); document.getElementById('edit-id').value = id; ['owner','parent','hld','ward','road'].forEach(k => document.getElementById(k).value = d[k]); document.getElementById('save-btn').innerText = "আপডেট"; document.getElementById('cancel-btn').classList.remove('hidden'); window.scrollTo(0,0); }
</script>
</body>
</html>
