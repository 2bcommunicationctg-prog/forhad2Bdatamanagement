<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>2B Communication | Logic Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.cdnfonts.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #0f172a; color: white; margin: 0; }
        .ui-card { background: #1e293b; border-radius: 15px; border: 1px solid #334155; }
        input { background: #334155 !important; color: white !important; border: 1px solid #475569 !important; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        @media print {
            .no-print { display: none !important; }
            #print-zone { display: block !important; }
            .page { page-break-after: always; position: relative; width: 10in; height: 7in; background: white; }
        }
        #print-zone { display: none; }
        #qr-box { display: none; }
    </style>
</head>
<body onload="initApp()">

<div id="main-content" class="hidden no-print max-w-5xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
        <h1 class="text-xl font-bold text-indigo-400">2B Communication</h1>
        <button onclick="logout()" class="bg-red-600 px-4 py-1 rounded text-xs">লগআউট</button>
    </div>

    <div id="admin-panel" class="hidden ui-card p-4 mb-6 border-l-4 border-red-500">
        <h3 class="text-xs font-bold mb-3 text-red-400">অ্যাডমিন কন্ট্রোল</h3>
        <button onclick="deleteAllEntries()" class="bg-red-900/40 text-red-400 border border-red-800 w-full py-2 rounded text-xs font-bold">⚠️ সব এন্ট্রি ডাটা মুছুন (লগইন ঠিক থাকবে)</button>
    </div>

    <div class="ui-card p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input type="hidden" id="edit-id">
            <input type="text" id="owner" placeholder="মালিকের নাম">
            <input type="text" id="parent" placeholder="পিতা/স্বামী">
            <input type="text" id="hld" placeholder="হোল্ডিং নং">
            <input type="text" id="ward" placeholder="ওয়ার্ড নং">
            <input type="text" id="road" placeholder="ঠিকানা" class="md:col-span-2">
        </div>
        <button onclick="saveData()" class="w-full bg-indigo-600 py-3 rounded-lg font-bold mt-4">ডাটা সেভ করুন</button>
    </div>

    <div id="admin-btns" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <button onclick="buildZip('ID')" class="bg-green-700 py-4 rounded-xl font-bold">🆔 ID SVG (সাদা)</button>
        <button onclick="buildZip('Plate')" class="bg-slate-700 py-4 rounded-xl font-bold">🍽️ Plate SVG (কালো)</button>
        <button onclick="window.print()" class="bg-blue-600 py-4 rounded-xl font-bold">🖨️ প্রিন্ট ভিউ</button>
    </div>

    <div id="list" class="space-y-1"></div>
</div>

<div id="print-zone"></div>
<div id="qr-box"></div>

<script>
    const firebaseConfig = { databaseURL: "https://b-system-73a7f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let entries = [], currentUser = sessionStorage.getItem('user_2b');

    function initApp() {
        database.ref('users').on('value', (s) => {
            let users = s.val() || {};
            // যদি ডাটাবেস খালি থাকে, তবে অটোমেটিক অ্যাডমিন তৈরি হবে
            if (!users.admin) {
                database.ref('users/admin').set({pass: "forhad786"});
            }

            if (currentUser && users[currentUser]) {
                document.getElementById('main-content').classList.remove('hidden');
                if(currentUser === 'admin') {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('admin-btns').classList.remove('hidden');
                }
                syncData();
            } else {
                const id = prompt("ID:"); const p = prompt("Pass:");
                if(id && users[id] && users[id].pass === p) {
                    sessionStorage.setItem('user_2b', id); location.reload();
                } else { alert("ভুল তথ্য!"); location.reload(); }
            }
        });
    }

    function syncData() {
        database.ref('entries').on('value', (s) => {
            const val = s.val();
            entries = val ? Object.keys(val).map(id => ({...val[id], id})) : [];
            renderList();
        });
    }

    function saveData() {
        const d = { 
            owner: document.getElementById('owner').value, 
            parent: document.getElementById('parent').value, 
            hld: document.getElementById('hld').value, 
            ward: document.getElementById('ward').value, 
            road: document.getElementById('road').value, 
            user: currentUser 
        };
        const eid = document.getElementById('edit-id').value;
        if(eid) database.ref('entries/'+eid).update(d); else database.ref('entries').push(d);
        location.reload();
    }

    function renderList() {
        document.getElementById('list').innerHTML = entries.slice().reverse().map(e => `
            <div class="ui-card p-3 flex justify-between items-center text-xs mb-1">
                <div><b>${e.owner}</b> - ${e.hld}</div>
                <button onclick="editData('${e.id}')" class="text-blue-400">Edit</button>
            </div>`).join('');
    }

    function editData(id) {
        const d = entries.find(e => e.id === id);
        ['owner','parent','hld','ward','road'].forEach(k => document.getElementById(k).value = d[k]);
        document.getElementById('edit-id').value = id;
    }

    async function buildZip(mode) {
        const zip = new JSZip();
        for(let d of entries) {
            const qrBox = document.getElementById('qr-box');
            qrBox.innerHTML = '';
            new QRCode(qrBox, { text: `মালিক: ${d.owner}\nহোল্ডিং: ${d.hld}`, width: 120, height: 120 });
            const qrImg = qrBox.querySelector('img').src;
            const hColor = (mode === 'ID') ? "#ffffff" : "#000000";

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="242" height="153" viewBox="0 0 242 153">
                <text x="72" y="58" font-family="Arial" font-weight="bold" font-size="10" fill="#000000">${d.owner}</text>
                <text x="72" y="72" font-family="Arial" font-size="9" fill="#000000">${d.parent}</text>
                <text x="72" y="86" font-family="Arial" font-weight="bold" font-size="9" fill="${hColor}">${d.hld}</text>
                <text x="72" y="100" font-family="Arial" font-size="9" fill="#000000">${d.ward}</text>
                <text x="72" y="114" font-family="Arial" font-size="8" fill="#000000">${d.road}</text>
                <image x="175" y="55" width="50" height="50" xlink:href="${qrImg}" />
            </svg>`;
            zip.file(`${mode}_${d.hld}.svg`, svg);
        }
        zip.generateAsync({type:"blob"}).then(c => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(c); a.download = `2B_${mode}.zip`; a.click();
        });
    }

    function deleteAllEntries() {
        if(confirm("সব এন্ট্রি মুছে ফেলবেন? (লগইন আইডি মুছবে না)")) {
            database.ref('entries').remove();
        }
    }

    function logout() { sessionStorage.clear(); location.reload(); }
</script>
</body>
</html>
