<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>2B Communication | GitHub Download Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.cdnfonts.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #0f172a; color: white; margin: 0; }
        .ui-card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
        input, textarea { background: #334155 !important; color: white !important; border: 1px solid #475569 !important; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        @media print {
            .no-print { display: none !important; }
            #print-zone { display: block !important; }
            .page { page-break-after: always; position: relative; width: 10in; height: 7in; background: white !important; color: black; }
            .bg-template { position: absolute; top: 0; left: 0; width: 10in; height: 7in; z-index: 1; }
            .plate-info { position: absolute; z-index: 10; left: 315px; width: 360px; font-size: 27pt; font-weight: bold; text-align: left; }
            .p-owner { top: 235px; } .p-parent { top: 285px; } .p-hld { top: 335px; } .p-ward { top: 385px; } .p-road { top: 435px; }
            .p-qr { position: absolute; z-index: 20; left: 678px; top: 220px; width: 185px; }
        }
        #print-zone { display: none; }
    </style>
</head>
<body onload="initApp()">

<div id="main-content" class="hidden no-print max-w-5xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
        <h1 class="text-xl font-bold text-indigo-400">2B Communication</h1>
        <div class="flex gap-4 items-center">
            <span id="user-display" class="text-[10px] bg-slate-800 px-3 py-1 rounded"></span>
            <button onclick="logout()" class="text-red-400 text-xs font-bold">লগআউট</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden space-y-4 mb-6">
        <div class="ui-card p-4 border-t-4 border-indigo-500">
            <h2 class="text-xs font-bold text-indigo-300 uppercase mb-4">অ্যাডমিন কন্ট্রোল</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-slate-800 p-2 rounded text-center">
                    <p class="text-[9px] text-slate-400">ID Template (id.png)</p>
                    <input type="file" onchange="loadImg(this, 'id')" class="text-[10px] w-full">
                </div>
                <div class="bg-slate-800 p-2 rounded text-center">
                    <p class="text-[9px] text-slate-400">Plate Template (plate.png)</p>
                    <input type="file" onchange="loadImg(this, 'plate')" class="text-[10px] w-full">
                </div>
            </div>
            <button onclick="deleteAllData()" class="w-full text-red-500 text-[10px] border border-red-900 py-1 rounded">সব ডাটা মুছুন</button>
        </div>
    </div>

    <div class="ui-card p-6 mb-6 shadow-xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input type="hidden" id="edit-id">
            <input type="text" id="owner" placeholder="মালিকের নাম">
            <input type="text" id="parent" placeholder="পিতা/স্বামীর নাম">
            <input type="text" id="hld" placeholder="হোল্ডিং নং">
            <input type="text" id="ward" placeholder="ওয়ার্ড নং">
            <textarea id="road" placeholder="ঠিকানা" class="md:col-span-2 h-16"></textarea>
        </div>
        <button id="save-btn" onclick="saveData()" class="w-full bg-indigo-600 mt-4 py-3 rounded-lg font-bold">ডাটা সেভ করুন</button>
    </div>

    <div id="action-btns" class="hidden grid grid-cols-2 gap-4 mb-6">
        <button onclick="buildZip()" class="bg-slate-700 py-4 rounded-xl font-bold border border-slate-600 shadow-lg">📂 SVG জিপ ডাউনলোড</button>
        <button onclick="window.print()" class="bg-blue-600 py-4 rounded-xl font-bold shadow-lg">🖨️ প্রিন্ট ভিউ</button>
    </div>

    <div id="list" class="space-y-1"></div>
</div>

<div id="print-zone"></div>

<script>
    const firebaseConfig = { databaseURL: "https://b-system-73a7f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let entries = [], currentUser = sessionStorage.getItem('user_2b'), idB64 = "", plateB64 = "";

    function loadImg(input, type) {
        if (input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => { 
                if(type==='id') idB64 = e.target.result; 
                else { plateB64 = e.target.result; renderPrint(); }
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function initApp() {
        database.ref('users').on('value', (s) => {
            const users = s.val() || { "admin": { pass: "forhad786" } };
            if (currentUser && users[currentUser]) {
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = currentUser.toUpperCase();
                if(currentUser === 'admin') {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('action-btns').classList.remove('hidden');
                }
                syncData();
            } else {
                const id = prompt("ID:").toLowerCase().trim();
                const p = prompt("Pass:");
                if(id && users[id] && users[id].pass === p) {
                    sessionStorage.setItem('user_2b', id);
                    location.reload();
                } else { alert("ভুল তথ্য!"); location.reload(); }
            }
        });
    }

    function syncData() {
        database.ref('entries').on('value', (s) => {
            const val = s.val();
            entries = val ? Object.keys(val).map(k => ({...val[k], id: k})) : [];
            renderList(); renderPrint();
        });
    }

    function saveData() {
        const d = { 
            owner: document.getElementById('owner').value, 
            parent: document.getElementById('parent').value, 
            hld: document.getElementById('hld').value, 
            ward: document.getElementById('ward').value, 
            road: document.getElementById('road').value, 
            user: currentUser 
        };
        if(!d.owner || !d.hld) return alert("তথ্য দিন");
        const eid = document.getElementById('edit-id').value;
        if(eid) database.ref('entries/'+eid).update(d); else database.ref('entries').push(d);
        ['owner','parent','hld','ward','road','edit-id'].forEach(i => document.getElementById(i).value="");
    }

    function renderList() {
        const filtered = currentUser==='admin' ? entries : entries.filter(e => e.user === currentUser);
        document.getElementById('list').innerHTML = filtered.reverse().map(e => `
            <div class="ui-card p-3 flex justify-between items-center text-xs mb-1">
                <div><p class="font-bold text-indigo-300">${e.owner}</p><p class="text-[10px] text-slate-500">${e.hld}</p></div>
                <div class="flex gap-3">
                    <button onclick="editData('${e.id}')" class="text-blue-400">ইডিট</button>
                    ${currentUser==='admin' ? `<button onclick="database.ref('entries/${e.id}').remove()" class="text-red-500">×</button>` : ''}
                </div>
            </div>`).join('');
    }

    function editData(id) {
        const e = entries.find(x => x.id === id);
        ['owner','parent','hld','ward','road'].forEach(k => document.getElementById(k).value = e[k]);
        document.getElementById('edit-id').value = id;
        window.scrollTo(0,0);
    }

    async function buildZip() {
        if(!idB64) return alert("দয়া করে id.png আপলোড করুন!");
        const zip = new JSZip();
        
        for(let d of entries) {
            const qrText = `মালিক: ${d.owner}\nপিতা: ${d.parent}\nহোল্ডিং: ${d.hld}\nওয়ার্ড: ${d.ward}\nঠিকানা: ${d.road}`;
            
            // Fixed QR code fetching for HTTPS/GitHub
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrText)}`;
            
            const svg = `<?xml version="1.0" encoding="UTF-8"?>
            <svg width="85.5mm" height="54mm" viewBox="0 0 85.5 54" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                <image xlink:href="${idB64}" x="0" y="0" width="85.5" height="54" preserveAspectRatio="none"/>
                <text x="25.5" y="20.5" font-family="Arial" font-size="3.2" font-weight="bold">${d.owner}</text>
                <text x="25.5" y="25.5" font-family="Arial" font-size="3.2">${d.parent}</text>
                <text x="25.5" y="30.5" font-family="Arial" font-size="3.2" fill="white" font-weight="bold">${d.hld}</text>
                <text x="25.5" y="35.5" font-family="Arial" font-size="3.2">${d.ward}</text>
                <text x="25.5" y="40.5" font-family="Arial" font-size="2.8">${d.road}</text>
                <image xlink:href="${qrUrl}" x="63.5" y="28" height="19" width="19"/>
            </svg>`;
            
            zip.file(`${d.hld.replace(/\//g,'-')}.svg`, svg);
        }

        zip.generateAsync({type:"blob"}).then(function(content) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "2B_Communication_Cards.zip";
            link.click();
        });
    }

    function renderPrint() {
        if(!plateB64) return;
        document.getElementById('print-zone').innerHTML = entries.map(e => `
            <div class="page">
                <img src="${plateB64}" class="bg-template">
                <div class="plate-info p-owner">${e.owner}</div>
                <div class="plate-info p-parent">${e.parent}</div>
                <div class="plate-info p-hld">${e.hld}</div>
                <div class="plate-info p-ward">${e.ward}</div>
                <div class="plate-info p-road">${e.road}</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(e.owner+'\n'+e.hld)}" class="p-qr">
            </div>`).join('');
    }

    function logout() { sessionStorage.removeItem('user_2b'); location.reload(); }
    function deleteAllData() { if(confirm("সব ডাটা মুছবেন?")) database.ref('entries').remove(); }
</script>
</body>
</html>
