<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2B Communication | Final Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.cdnfonts.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #f1f5f9; }
        .ui-panel { max-width: 950px; margin: 10px auto; padding: 20px; background: white; border-radius: 24px; border-top: 8px solid #4f46e5; }
        @media print {
            .no-print { display: none !important; }
            #print-zone { display: block !important; }
            .page { page-break-after: always; position: relative; width: 10in; height: 7in; margin: 0 auto; overflow: hidden; }
            .bg-template { position: absolute; top: 0; left: 0; width: 10in; height: 7in; z-index: 1; }
            .plate-info { position: absolute; color: black; z-index: 10; left: 315px; width: 450px; text-align: left; font-size: 27pt !important; line-height: 1.1; }
            .p-owner { top: 235px; } .p-parent { top: 285px; } .p-hld { top: 335px; font-weight: bold; } 
            .p-ward { top: 385px; } .p-road { top: 435px; line-height: 1.1; } 
            .p-qr { position: absolute; z-index: 20; left: 678px; top: 220px; width: 185px; }
        }
        #print-zone { display: none; }
    </style>
</head>
<body onload="initApp()">

<div id="main-content" class="hidden no-print ui-panel shadow-2xl">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <div>
            <h2 class="text-2xl font-black text-indigo-600">2B Communication</h2>
            <p id="user-display" class="text-[10px] text-slate-500 font-bold uppercase"></p>
        </div>
        <button onclick="logout()" class="text-red-500 text-xs font-bold border border-red-100 px-4 py-1.5 rounded-full hover:bg-red-50">লগআউট</button>
    </div>

    <div id="super-admin-panel" class="hidden space-y-4 mb-8">
        <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl border-b-8 border-indigo-600">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-indigo-400 font-bold tracking-widest uppercase text-xs">📊 কন্ট্রোল প্যানেল (এডমিন)</h3>
                <div class="flex gap-2">
                    <button onclick="clearAllData()" class="bg-red-600 px-4 py-1 rounded-full text-[10px] font-bold">সব মুছুন</button>
                    <div class="bg-indigo-600 px-4 py-1 rounded-full text-[10px] font-bold">মোট ডাটা: <span id="total-count">0</span></div>
                </div>
            </div>
            
            <div id="user-stats-grid" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                    <p class="text-[11px] font-bold text-indigo-300 mb-3 uppercase">নতুন ইউজার যোগ করুন:</p>
                    <div class="flex flex-col gap-2 mb-4">
                        <input type="text" id="new-user-id" placeholder="ইউজার আইডি (যেমন: user1)" class="bg-slate-700 p-2 rounded-lg text-xs border border-slate-600 outline-none focus:border-indigo-400">
                        <input type="text" id="new-user-pass" placeholder="পাসওয়ার্ড" class="bg-slate-700 p-2 rounded-lg text-xs border border-slate-600 outline-none focus:border-indigo-400">
                        <button onclick="addNewUser()" class="bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded-lg text-xs font-bold transition-all">ইউজার সেভ করুন</button>
                    </div>
                    <p class="text-[11px] font-bold text-indigo-300 mb-2 uppercase border-t border-slate-700 pt-3">ইউজার লিস্ট:</p>
                    <div id="user-management-list" class="space-y-2 max-h-32 overflow-y-auto"></div>
                </div>

                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 h-fit">
                    <p class="text-[11px] font-bold text-indigo-300 mb-2 uppercase">প্লেট টেমপ্লেট পরিবর্তন:</p>
                    <input type="file" id="plate-input" accept="image/*" onchange="handlePlateUpload()" class="text-xs text-slate-400 mb-3">
                    <div class="p-2 border border-dashed border-slate-600 rounded-lg text-center">
                        <p class="text-[9px] text-slate-500">এখানে ছবি আপলোড করলে সব প্লেটের ব্যাকগ্রাউন্ড অটো আপডেট হবে।</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-slate-50 p-6 rounded-2xl mb-8 border border-slate-200">
        <input type="hidden" id="edit-id" value="">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="owner" placeholder="মালিকের নাম" class="p-3 border rounded-xl outline-none focus:ring-2 ring-indigo-400">
            <input type="text" id="parent" placeholder="পিতা/স্বামী" class="p-3 border rounded-xl outline-none focus:ring-2 ring-indigo-400">
            <input type="text" id="hld" placeholder="হোল্ডিং নং" class="p-3 border rounded-xl outline-none focus:ring-2 ring-indigo-400">
            <input type="text" id="ward" placeholder="ওয়ার্ড নং" class="p-3 border rounded-xl outline-none focus:ring-2 ring-indigo-400">
            <textarea id="road" placeholder="মহল্লা/গ্রাম/রাস্তা" class="md:col-span-2 p-3 border rounded-xl h-16 outline-none focus:ring-2 ring-indigo-400"></textarea>
        </div>
        <button id="save-btn" onclick="saveData()" class="w-full mt-4 bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all">অনলাইনে সেভ করুন</button>
    </div>

    <div id="admin-action-buttons" class="hidden grid grid-cols-2 gap-4 mb-8">
        <button id="zip-btn" onclick="downloadBulkZip()" class="bg-emerald-500 text-white py-4 rounded-2xl font-bold text-sm shadow-lg hover:bg-emerald-600">📂 সব SVG ডাউনলোড (ZIP)</button>
        <button onclick="startPrinting()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg hover:bg-blue-700">🖨️ প্রিন্ট কপি তৈরি করুন</button>
    </div>

    <input type="text" id="search-box" onkeyup="renderList()" placeholder="হোল্ডিং বা নাম দিয়ে খুঁজুন..." class="w-full p-4 border rounded-2xl bg-white mb-4 shadow-sm outline-none focus:border-indigo-500">
    <div id="data-list-container" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
</div>

<div id="print-zone"></div>

<script>
    const firebaseConfig = { databaseURL: "https://b-system-73a7f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let db = []; let users = {}; let currentUser = sessionStorage.getItem('logged_2b_user');
    let plateTemplate = localStorage.getItem('2b_plate_v3') || "";

    function initApp() {
        database.ref('users').on('value', (snap) => {
            users = snap.val() || { "admin": { pass: "forhad786" } };
            if (currentUser && users[currentUser]) {
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = `ইউজার: ${currentUser}`;
                if(currentUser === 'admin') {
                    document.getElementById('super-admin-panel').classList.remove('hidden');
                    document.getElementById('admin-action-buttons').classList.remove('hidden');
                }
                loadData();
            } else {
                const id = prompt("ID:"); const pass = prompt("Pass:");
                if (users[id] && users[id].pass === pass) { sessionStorage.setItem('logged_2b_user', id); location.reload(); }
            }
        });
    }

    function loadData() {
        database.ref('entries').on('value', (snap) => {
            const val = snap.val();
            db = val ? Object.keys(val).map(id => ({...val[id], id})) : [];
            document.getElementById('total-count').innerText = db.length;
            renderList(); renderStats(); renderUserManagement();
        });
    }

    // নতুন ইউজার যোগ করার ফাংশন
    function addNewUser() {
        const id = document.getElementById('new-user-id').value.trim();
        const pass = document.getElementById('new-user-pass').value.trim();
        if(!id || !pass) return alert("আইডি এবং পাসওয়ার্ড দিন");
        database.ref('users/' + id).set({ pass: pass })
        .then(() => {
            alert("ইউজার সফলভাবে যোগ করা হয়েছে");
            document.getElementById('new-user-id').value = "";
            document.getElementById('new-user-pass').value = "";
        });
    }

    function renderUserManagement() {
        const listDiv = document.getElementById('user-management-list');
        listDiv.innerHTML = "";
        Object.keys(users).forEach(u => {
            if(u === 'admin') return;
            listDiv.innerHTML += `
                <div class="flex justify-between items-center bg-slate-700 p-2 rounded-lg text-[10px]">
                    <span><b class="text-indigo-300">${u}</b> - ${users[u].pass}</span>
                    <button onclick="if(confirm('ইউজার মুছবেন?')) database.ref('users/${u}').remove()" class="text-red-400 font-bold">মুছুন</button>
                </div>`;
        });
    }

    function renderList() {
        const container = document.getElementById('data-list-container');
        const q = document.getElementById('search-box').value.toLowerCase();
        let list = (currentUser === 'admin') ? db : db.filter(d => d.user === currentUser);
        if(q) list = list.filter(d => d.owner.toLowerCase().includes(q) || d.hld.includes(q));
        
        container.innerHTML = list.slice().reverse().map(d => `
            <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                <div>
                    <h4 class="font-bold text-slate-800 text-sm">${d.owner} <span class="text-indigo-500 font-mono text-xs ml-1">#${d.hld}</span></h4>
                    <p class="text-[9px] text-slate-400 uppercase mt-1">${d.user} | ${d.date}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="editEntry('${d.id}')" class="bg-amber-50 text-amber-600 px-3 py-1.5 rounded-xl text-[10px] font-bold">এডিট</button>
                    ${currentUser==='admin' ? `<button onclick="deleteEntry('${d.id}')" class="text-red-400 p-2">🗑️</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function renderStats() {
        const grid = document.getElementById('user-stats-grid');
        const counts = {}; db.forEach(d => counts[d.user] = (counts[d.user] || 0) + 1);
        grid.innerHTML = Object.keys(counts).map(u => `
            <div class="bg-slate-800 p-2 rounded-xl border border-slate-700 text-center">
                <p class="text-[8px] text-indigo-300 truncate font-bold uppercase">${u}</p>
                <p class="text-lg font-black">${counts[u]}</p>
            </div>
        `).join('');
    }

    function handlePlateUpload() {
        const file = document.getElementById('plate-input').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { localStorage.setItem('2b_plate_v3', reader.result); location.reload(); };
        reader.readAsDataURL(file);
    }

    async function downloadBulkZip() {
        const btn = document.getElementById('zip-btn'); btn.disabled = true; btn.innerText = "অপেক্ষা করুন...";
        const zip = new JSZip();
        for (let i = 0; i < db.length; i++) {
            const d = db[i];
            const qrText = `মালিক: ${d.owner}\nপিতা: ${d.parent}\nহোল্ডিং: ${d.hld}\nওয়ার্ড: ${d.ward}\nরাস্তা: ${d.road}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrText)}`;
            try {
                const res = await fetch(qrUrl); const blob = await res.blob();
                const b64 = await new Promise(r => {const rd = new FileReader(); rd.onloadend = () => r(rd.result); rd.readAsDataURL(blob);});
                const svg = `<?xml version="1.0" encoding="UTF-8"?><svg width="85.5mm" height="54mm" viewBox="0 0 85.5 54" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><rect width="85.5" height="54" fill="white"/><text x="25" y="21.5" font-family="Arial" font-size="3.2" font-weight="bold" fill="black">${d.owner}</text><text x="25" y="26.2" font-family="Arial" font-size="3" fill="black">${d.parent}</text><text x="25" y="31.0" font-family="Arial" font-size="3.2" font-weight="bold" fill="white">${d.hld}</text><text x="25" y="36.0" font-family="Arial" font-size="3" fill="black">${d.ward}</text><text x="25" y="41.3" font-family="Arial" font-size="2.8" fill="black">${d.road}</text><image xlink:href="${b64}" x="60" y="29" height="22" width="22"/></svg>`;
                zip.file(`ID_${d.hld.replace(/\s/g, '_')}.svg`, svg);
                btn.innerText = `প্রসেসিং: ${i+1}/${db.length}`;
            } catch(e) {}
        }
        zip.generateAsync({type: "blob"}).then(c => {
            const a = document.createElement("a"); a.href = URL.createObjectURL(c); a.download = "2B_IDs.zip"; a.click();
            btn.disabled = false; btn.innerText = "📂 সব SVG ডাউনলোড (ZIP)";
        });
    }

    function startPrinting() {
        const zone = document.getElementById('print-zone');
        zone.innerHTML = "<h2 style='text-align:center; padding:50px;'>প্রিন্ট কপি তৈরি হচ্ছে...</h2>";
        setTimeout(() => {
            zone.innerHTML = db.map(d => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent('মালিক: '+d.owner+'\nহোল্ডিং: '+d.hld)}`;
                return `<div class="page"><img src="${plateTemplate}" class="bg-template"><div class="plate-info p-owner">${d.owner}</div><div class="plate-info p-parent">${d.parent}</div><div class="plate-info p-hld">${d.hld}</div><div class="plate-info p-ward">${d.ward}</div><div class="plate-info p-road">${d.road}</div><img src="${qrUrl}" class="p-qr"></div>`;
            }).join('');
            window.print();
        }, 1000);
    }

    function saveData() {
        const owner = document.getElementById('owner').value.trim();
        const hld = document.getElementById('hld').value.trim();
        const editId = document.getElementById('edit-id').value;
        if(!owner || !hld) return alert("তথ্য দিন");
        const entry = { owner, parent: document.getElementById('parent').value, hld, ward: document.getElementById('ward').value, road: document.getElementById('road').value, user: currentUser, date: new Date().toLocaleDateString('bn-BD') };
        if(editId) database.ref('entries/' + editId).update(entry); else database.ref('entries').push(entry);
        ['owner','parent','hld','ward','road','edit-id'].forEach(i => document.getElementById(i).value="");
        document.getElementById('save-btn').innerText = "অনলাইনে সেভ করুন";
    }

    function deleteEntry(id) { if(confirm("মুছবেন?")) database.ref('entries/' + id).remove(); }
    function clearAllData() { if(confirm("সব ডাটা মুছে যাবে! নিশ্চিত?")) database.ref('entries').remove(); }
    function editEntry(id) {
        const d = db.find(i => i.id === id);
        ['owner','parent','hld','ward','road'].forEach(i => document.getElementById(i).value = d[i]);
        document.getElementById('edit-id').value = id; document.getElementById('save-btn').innerText = "আপডেট করুন";
        window.scrollTo({top:0, behavior:'smooth'});
    }
    function logout() { sessionStorage.removeItem('logged_2b_user'); location.reload(); }
</script>
</body>
</html>
