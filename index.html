<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>2B Communication | All Options Restored</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.cdnfonts.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #0f172a; color: white; margin: 0; }
        .ui-card { background: #1e293b; border-radius: 15px; border: 1px solid #334155; }
        input, textarea { background: #334155 !important; color: white !important; border: 1px solid #475569 !important; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        @media print {
            .no-print { display: none !important; }
            #print-zone { display: block !important; background: white !important; }
            .page { page-break-after: always; position: relative; width: 10in; height: 7in; margin: 0; overflow: hidden; background: white !important; }
            .bg-template { position: absolute; top: 0; left: 0; width: 10in; height: 7in; z-index: 1; }
            .plate-info { 
                position: absolute; z-index: 10; left: 315px; width: 360px; 
                text-align: left; font-size: 27pt; color: black; font-weight: bold; 
                white-space: nowrap; display: flex; align-items: center;
            }
            .auto-fit { display: inline-block; transform-origin: left center; }
            .p-owner { top: 235px; } .p-parent { top: 285px; } .p-hld { top: 335px; }
            .p-ward { top: 385px; } .p-road { top: 435px; }
            .p-qr { position: absolute; z-index: 20; left: 678px; top: 220px; width: 185px; }
        }
        #print-zone { display: none; }
    </style>
</head>
<body onload="initApp()">

<div id="main-content" class="hidden no-print max-w-5xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
        <h1 class="text-xl font-bold text-indigo-400">2B Communication</h1>
        <div class="flex gap-4 items-center">
            <span id="user-display" class="text-[10px] bg-slate-800 px-3 py-1 rounded text-slate-400"></span>
            <button onclick="logout()" class="text-red-400 text-xs font-bold">লগআউট</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden space-y-4 mb-6">
        <div class="ui-card p-4 border-l-4 border-indigo-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold text-indigo-300 uppercase">ইউজার ও ডাটা কন্ট্রোল</h2>
                <div class="bg-indigo-600 px-3 py-1 rounded text-[10px] font-bold">মোট ডাটা: <span id="total-count">0</span></div>
            </div>
            
            <div id="user-stats" class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-4"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
                <input type="text" id="new-user" placeholder="ইউজার আইডি">
                <input type="text" id="new-pass" placeholder="পাসওয়ার্ড">
                <button onclick="createUser()" class="bg-indigo-600 rounded-lg text-xs font-bold py-2">ইউজার সেট/আপডেট</button>
            </div>

            <div class="grid grid-cols-2 gap-4 border-t border-slate-700 pt-4 mb-4">
                <div><p class="text-[9px] mb-1 text-slate-500">id.png</p><input type="file" onchange="loadImg(this, 'id')" class="text-[10px] w-full"></div>
                <div><p class="text-[9px] mb-1 text-slate-500">plate.png</p><input type="file" onchange="loadImg(this, 'plate')" class="text-[10px] w-full"></div>
            </div>
            <button onclick="deleteAllData()" class="w-full bg-red-900/30 text-red-400 border border-red-800 py-1 text-[10px] font-bold rounded">সব ডাটা মুছুন</button>
        </div>
    </div>

    <div class="ui-card p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input type="hidden" id="edit-id">
            <input type="text" id="owner" placeholder="মালিকের নাম">
            <input type="text" id="parent" placeholder="পিতা/স্বামীর নাম">
            <input type="text" id="hld" placeholder="হোল্ডিং নং">
            <input type="text" id="ward" placeholder="ওয়ার্ড নং">
            <textarea id="road" placeholder="ঠিকানা" class="md:col-span-2 h-16"></textarea>
        </div>
        <div class="flex gap-2 mt-4">
            <button id="save-btn" onclick="saveData()" class="flex-1 bg-indigo-600 py-3 rounded-lg font-bold">ডাটা সেভ করুন</button>
            <button id="cancel-btn" onclick="resetForm()" class="hidden bg-slate-700 px-6 rounded-lg font-bold">বাতিল</button>
        </div>
    </div>

    <div id="admin-btns" class="hidden grid grid-cols-2 gap-4 mb-6">
        <button onclick="buildZip()" class="bg-slate-700 py-3 rounded-lg font-bold border border-slate-600">📂 SVG জিপ ডাউনলোড</button>
        <button onclick="window.print()" class="bg-blue-600 py-3 rounded-lg font-bold shadow-lg">🖨️ প্রিন্ট ভিউ (10x7)</button>
    </div>

    <div class="flex justify-between items-center mb-2 px-1 text-xs text-slate-400">
        <span>এন্ট্রিকৃত তালিকা:</span>
        <span id="personal-count" class="text-indigo-400 font-bold"></span>
    </div>
    <div id="list" class="space-y-1 max-h-[400px] overflow-y-auto pr-2"></div>
</div>

<div id="print-zone"></div>

<script>
    const firebaseConfig = { databaseURL: "https://b-system-73a7f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let entries = [], usersData = {}, currentUser = sessionStorage.getItem('user_2b'), idImg = "", plateImg = "";

    function loadImg(input, type) {
        if (input.files && input.files[0]) {
            const rd = new FileReader();
            rd.onload = (e) => { 
                if(type === 'id') idImg = e.target.result; 
                else { plateImg = e.target.result; renderPrint(); }
                alert(type.toUpperCase() + " আপলোড হয়েছে!");
            };
            rd.readAsDataURL(input.files[0]);
        }
    }

    function initApp() {
        database.ref('users').on('value', (s) => {
            usersData = s.val() || { "admin": { pass: "forhad786" } };
            if (currentUser && usersData[currentUser]) {
                if(usersData[currentUser].status === 'blocked') { alert("ব্লকড আইডি!"); logout(); return; }
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = `ইউজার: ${currentUser.toUpperCase()}`;
                if(currentUser === 'admin') {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('admin-btns').classList.remove('hidden');
                }
                syncData();
            } else {
                const id = prompt("ID:").toLowerCase().trim(); const p = prompt("Pass:");
                if(id && usersData[id] && usersData[id].pass === p) {
                    sessionStorage.setItem('user_2b', id); location.reload();
                } else { alert("ভুল পাসওয়ার্ড!"); location.reload(); }
            }
        });
    }

    function syncData() {
        database.ref('entries').on('value', (s) => {
            const val = s.val();
            entries = val ? Object.keys(val).map(id => ({...val[id], id})) : [];
            renderStats(); renderList(); renderPrint();
        });
    }

    function renderStats() {
        const counts = {}; entries.forEach(e => counts[e.user] = (counts[e.user] || 0) + 1);
        if(currentUser === 'admin') {
            document.getElementById('total-count').innerText = entries.length;
            let html = "";
            Object.keys(usersData).forEach(u => {
                const isB = usersData[u].status === 'blocked';
                html += `<div class="bg-slate-800 p-2 rounded flex justify-between items-center border ${isB?'border-red-900':'border-slate-700'}">
                    <span class="text-[10px] font-bold uppercase ${isB?'text-red-500':'text-indigo-300'}">${u} (${counts[u]||0})</span>
                    <div class="flex gap-2">
                        <button onclick="updateStatus('${u}', '${isB?'active':'blocked'}')" class="text-[9px] px-2 py-1 bg-slate-700 rounded">${isB?'আনব্লক':'ব্লক'}</button>
                        <button onclick="delUser('${u}')" class="text-[9px] text-red-500 font-bold px-1">×</button>
                    </div>
                </div>`;
            });
            document.getElementById('user-stats').innerHTML = html;
        }
        document.getElementById('personal-count').innerText = `আপনার এন্ট্রি: ${entries.filter(e=>e.user===currentUser).length} টি`;
    }

    function createUser() {
        const u = document.getElementById('new-user').value.toLowerCase().trim();
        const p = document.getElementById('new-pass').value.trim();
        if(u && p) { database.ref('users/'+u).update({pass:p, status:'active'}); alert("সম্পন্ন!"); }
    }
    function updateStatus(u, s) { if(u!=='admin') database.ref('users/'+u).update({status:s}); }
    function delUser(u) { if(u!=='admin' && confirm("মুছবেন?")) database.ref('users/'+u).remove(); }
    function deleteAllData() { if(confirm("সব ডাটা মুছবেন?")) database.ref('entries').remove(); }

    function saveData() {
        const data = { owner: document.getElementById('owner').value, parent: document.getElementById('parent').value, hld: document.getElementById('hld').value, ward: document.getElementById('ward').value, road: document.getElementById('road').value, user: currentUser };
        if(!data.owner || !data.hld) return alert("তথ্য দিন");
        const eid = document.getElementById('edit-id').value;
        if(eid) database.ref('entries/'+eid).update(data); else database.ref('entries').push(data);
        resetForm();
    }

    function editData(id) {
        const d = entries.find(e => e.id === id);
        document.getElementById('edit-id').value = id;
        ['owner','parent','hld','ward','road'].forEach(k => document.getElementById(k).value = d[k]);
        document.getElementById('save-btn').innerText = "আপডেট করুন";
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        ['owner','parent','hld','ward','road'].forEach(k => document.getElementById(k).value = "");
        document.getElementById('save-btn').innerText = "ডাটা সেভ করুন";
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    function renderList() {
        const list = (currentUser === 'admin') ? entries : entries.filter(e => e.user === currentUser);
        document.getElementById('list').innerHTML = list.slice().reverse().map(e => `
            <div class="ui-card p-3 flex justify-between items-center text-xs mb-1">
                <div><p class="font-bold text-indigo-300">${e.owner}</p><p class="text-[10px] text-slate-500">${e.hld}</p></div>
                <div class="flex gap-4">
                    <button onclick="editData('${e.id}')" class="text-blue-400 font-bold uppercase">ইডিট</button>
                    ${currentUser==='admin'?'<button onclick="database.ref(\'entries/\'+ \''+e.id+'\').remove()" class="text-red-500">×</button>':''}
                </div>
            </div>`).join('');
    }

    // Alignment and Download logic (GitHub Fixed)
    function getSvgText(text, x, y, maxWidth, fontSize, isBold=false, color="black") {
        let estW = text.length * (fontSize * 0.52);
        let sX = estW > maxWidth ? (maxWidth / estW) : 1;
        return `<text x="${x}" y="${y}" font-family="Arial" font-size="${fontSize}" ${isBold?'font-weight="bold"':''} fill="${color}" style="transform: scale(${sX}, 1); transform-origin: ${x}px ${y}px;">${text}</text>`;
    }

    async function buildZip() {
        if(!idImg) return alert("id.png আপলোড করুন!");
        const zip = new JSZip();
        for(let d of entries) {
            const qrText = `মালিক: ${d.owner}\nপিতা: ${d.parent}\nহোল্ডিং: ${d.hld}\nওয়ার্ড: ${d.ward}\nঠিকানা: ${d.road}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrText)}`;
            const svg = `<?xml version="1.0" encoding="UTF-8"?><svg width="85.5mm" height="54mm" viewBox="0 0 85.5 54" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                <image xlink:href="${idImg}" x="0" y="0" width="85.5" height="54" preserveAspectRatio="none"/>
                ${getSvgText(d.owner, 25.5, 20.5, 36, 3.2, true)}
                ${getSvgText(d.parent, 25.5, 25.5, 36, 3.2)}
                ${getSvgText(d.hld, 25.5, 30.5, 36, 3.2, true, "white")}
                ${getSvgText(d.ward, 25.5, 35.5, 36, 3.2)}
                ${getSvgText(d.road, 25.5, 40.5, 36, 2.8)}
                <image xlink:href="${qrUrl}" x="63.5" y="28" height="19" width="19"/>
            </svg>`;
            zip.file(`${d.hld.replace(/\//g,'-')}.svg`, svg);
        }
        zip.generateAsync({type:"blob"}).then(c => { const a = document.createElement('a'); a.href = URL.createObjectURL(c); a.download = "2B_Cards.zip"; a.click(); });
    }

    function renderPrint() {
        if(!plateImg) return;
        document.getElementById('print-zone').innerHTML = entries.map(e => `
            <div class="page"><img src="${plateImg}" class="bg-template">
                <div class="plate-info p-owner"><span class="auto-fit">${e.owner}</span></div>
                <div class="plate-info p-parent"><span class="auto-fit">${e.parent}</span></div>
                <div class="plate-info p-hld"><span class="auto-fit">${e.hld}</span></div>
                <div class="plate-info p-ward"><span class="auto-fit">${e.ward}</span></div>
                <div class="plate-info p-road"><span class="auto-fit">${e.road}</span></div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(e.owner+'\n'+e.hld)}" class="p-qr">
            </div>`).join('');
        setTimeout(() => { document.querySelectorAll('.plate-info').forEach(b => { const s = b.querySelector('.auto-fit'); const sc = Math.min(1, b.offsetWidth / s.offsetWidth); s.style.transform = `scale(${sc}, 1)`; }); }, 500);
    }
    function logout() { sessionStorage.removeItem('user_2b'); location.reload(); }
</script>
</body>
</html>
