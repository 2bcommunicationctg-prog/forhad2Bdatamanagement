<html lang="bn">

        input, textarea { background: #334155 !important; color: white !important; border: 1px solid #475569 !important; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        @media print {
            .no-print { display: none !important; }
            #print-zone { display: block !important; background: white !important; }
            .page { page-break-after: always; position: relative; width: 10in; height: 7in; margin: 0; overflow: hidden; background: white !important; }
            .bg-template { position: absolute; top: 0; left: 0; width: 10in; height: 7in; z-index: 1; }
            .plate-info { 
                position: absolute; z-index: 10; left: 315px; width: 360px; 
                text-align: left; font-size: 27pt; color: black; font-weight: bold; 
                white-space: nowrap; display: flex; align-items: center;
            }
            .auto-fit { display: inline-block; transform-origin: left center; }
            .p-owner { top: 235px; } .p-parent { top: 285px; } 
            .p-hld { top: 335px; color: white !important; -webkit-print-color-adjust: exact; } 
            .p-ward { top: 385px; } .p-road { top: 435px; }
            .p-qr { position: absolute; z-index: 20; left: 678px; top: 220px; width: 185px; }
        }
        #print-zone { display: none; }
    </style>
</head>
<body onload="initApp()">

<div id="main-content" class="hidden no-print max-w-5xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
        <div>
            <h1 class="text-xl font-bold text-indigo-400">2B Communication</h1>
            <p id="user-display" class="text-[10px] text-slate-400 uppercase mt-1"></p>
        </div>
        <div class="flex gap-4 items-center">
            <div class="bg-indigo-600/20 px-3 py-1 rounded border border-indigo-500/30">
                <span class="text-[10px] text-indigo-300">মোট ডাটা: </span>
                <span id="total-count" class="font-bold text-indigo-400">0</span>
            </div>
            <button onclick="logout()" class="text-red-400 text-xs font-bold bg-red-900/20 px-3 py-1 rounded">লগআউট</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden space-y-4 mb-6">
        <div class="ui-card p-4 border-l-4 border-indigo-500">
            <h2 class="text-sm font-bold text-indigo-300 mb-4 uppercase">অ্যাডমিন প্যানেল</h2>
            <div id="user-stats" class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-4"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-y border-slate-700 py-4 mb-4">
                <div class="bg-slate-800 p-2 rounded text-center">
                    <p class="text-[10px] text-indigo-400 mb-2 text-center">ID Template (id.png)</p>
                    <input type="file" onchange="loadImg(this, 'id')" class="text-xs w-full">
                </div>
                <div class="bg-slate-800 p-2 rounded text-center">
                    <p class="text-[10px] text-indigo-400 mb-2 text-center">Plate Template (plate.png)</p>
                    <input type="file" onchange="loadImg(this, 'plate')" class="text-xs w-full">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
                <input type="text" id="new-user" placeholder="User ID">
                <input type="text" id="new-pass" placeholder="Password">
                <button onclick="createUser()" class="bg-indigo-600 rounded-lg text-xs font-bold py-2">ইউজার আপডেট</button>
            </div>
            <button onclick="deleteAllData()" class="w-full bg-red-900/30 text-red-500 border border-red-800 py-1 text-[10px] rounded">সব ডাটা মুছুন</button>
        </div>
    </div>

    <div class="ui-card p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input type="hidden" id="edit-id">
            <input type="text" id="owner" placeholder="মালিকের নাম">
            <input type="text" id="parent" placeholder="পিতা/স্বামীর নাম">
            <input type="text" id="hld" placeholder="হোল্ডিং নং">
            <input type="text" id="ward" placeholder="ওয়ার্ড নং">
            <textarea id="road" placeholder="ঠিকানা" class="md:col-span-2 h-16"></textarea>
        </div>
        <div class="flex gap-2 mt-4">
            <button id="save-btn" onclick="saveData()" class="flex-1 bg-indigo-600 py-3 rounded-lg font-bold">ডাটা সেভ করুন</button>
            <button id="cancel-btn" onclick="resetForm()" class="hidden bg-slate-700 px-6 rounded-lg font-bold">বাতিল</button>
        </div>
    </div>

    <div id="admin-btns" class="hidden grid grid-cols-2 gap-4 mb-6">
        <button onclick="buildZip()" class="bg-slate-700 py-4 rounded-xl font-bold border border-slate-600">📂 SVG জিপ ডাউনলোড</button>
        <button onclick="window.print()" class="bg-blue-600 py-4 rounded-xl font-bold shadow-lg">🖨️ প্রিন্ট ভিউ</button>
    </div>

    <div id="list" class="space-y-1 max-h-[400px] overflow-y-auto"></div>
</div>

<div id="print-zone"></div>

<script>
    const firebaseConfig = { databaseURL: "https://b-system-73a7f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let entries = [], usersData = {}, currentUser = sessionStorage.getItem('user_2b'), idImg = "", plateImg = "";

    function loadImg(input, type) {
        if (input.files && input.files[0]) {
            const rd = new FileReader();
            rd.onload = (e) => { if(type === 'id') idImg = e.target.result; else { plateImg = e.target.result; renderPrint(); } alert("ডান!"); };
            rd.readAsDataURL(input.files[0]);
        }
    }

    function initApp() {
        database.ref('users').on('value', (s) => {
            usersData = s.val() || { "admin": { pass: "forhad786" } };
            if (currentUser && usersData[currentUser]) {
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = `USER: ${currentUser}`;
                if(currentUser === 'admin') {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('admin-btns').classList.remove('hidden');
                }
                syncData();
            } else {
                const id = prompt("ID:"); const p = prompt("Pass:");
                if(id && usersData[id] && usersData[id].pass === p) {
                    sessionStorage.setItem('user_2b', id); location.reload();
                } else { alert("ভুল!"); location.reload(); }
            }
        });
    }

    function syncData() {
        database.ref('entries').on('value', (s) => {
            const val = s.val();
            entries = val ? Object.keys(val).map(id => ({...val[id], id})) : [];
            renderStats(); renderList(); renderPrint();
        });
    }

    function renderStats() {
        document.getElementById('total-count').innerText = entries.length;
        if(currentUser === 'admin') {
            const counts = {}; entries.forEach(e => counts[e.user] = (counts[e.user] || 0) + 1);
            let html = "";
            Object.keys(usersData).forEach(u => {
                html += `<div class="bg-slate-800 p-2 rounded flex justify-between items-center text-[10px] uppercase border border-slate-700"><span>${u} (${counts[u]||0})</span><button onclick="delUser('${u}')" class="text-red-500 font-bold">×</button></div>`;
            });
            document.getElementById('user-stats').innerHTML = html;
        }
    }

    function saveData() {
        const d = { owner: document.getElementById('owner').value, parent: document.getElementById('parent').value, hld: document.getElementById('hld').value, ward: document.getElementById('ward').value, road: document.getElementById('road').value, user: currentUser };
        if(!d.owner) return;
        const eid = document.getElementById('edit-id').value;
        if(eid) database.ref('entries/'+eid).update(d); else database.ref('entries').push(d);
        resetForm();
    }

    function renderList() {
        const list = (currentUser === 'admin') ? entries : entries.filter(e => e.user === currentUser);
        document.getElementById('list').innerHTML = list.slice().reverse().map(e => `
            <div class="ui-card p-3 flex justify-between items-center text-xs mb-1">
                <div><p class="font-bold text-indigo-300">${e.owner}</p><p class="text-slate-500">${e.hld}</p></div>
                <div class="flex gap-4">
                    <button onclick="editData('${e.id}')" class="text-blue-400">Edit</button>
                    ${currentUser==='admin'?'<button onclick="database.ref(\'entries/\'+ \''+e.id+'\').remove()" class="text-red-500">×</button>':''}
                </div>
            </div>`).join('');
    }

    function resetForm() {
        ['owner','parent','hld','ward','road','edit-id'].forEach(k => document.getElementById(k).value = "");
        document.getElementById('save-btn').innerText = "ডাটা সেভ করুন";
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    function editData(id) {
        const d = entries.find(e => e.id === id);
        ['owner','parent','hld','ward','road'].forEach(k => document.getElementById(k).value = d[k]);
        document.getElementById('edit-id').value = id;
        document.getElementById('save-btn').innerText = "আপডেট করুন";
        document.getElementById('cancel-btn').classList.remove('hidden');
    }

            const fullData = `মালিক: ${d.owner}\nপিতা/স্বামী: ${d.parent}\nহোল্ডিং: ${d.hld}\nওয়ার্ড: ${d.ward}\nঠিকানা: ${d.road}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(fullData)}`;
            
            const svg = `<?xml version="1.0" encoding="utf-8"?>

    <text transform="matrix(1 0 0 1 72 86)" font-family="Arial-BoldMT" font-size="9" fill="#FFFFFF">${d.hld}</text>
