<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>2B Communication | Illustrator Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.cdnfonts.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #0f172a; color: white; margin: 0; }
        .ui-card { background: #1e293b; border-radius: 15px; border: 1px solid #334155; }
        input, textarea { background: #334155 !important; color: white !important; border: 1px solid #475569 !important; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        @media print {
            .no-print { display: none !important; }
            #print-zone { display: block !important; background: white !important; }
            .page { page-break-after: always; position: relative; width: 10in; height: 7in; margin: 0; overflow: hidden; background: white !important; }
            .bg-template { position: absolute; top: 0; left: 0; width: 10in; height: 7in; z-index: 1; }
            .plate-info { position: absolute; z-index: 10; left: 315px; width: 360px; text-align: left; font-size: 27pt; color: black; font-weight: bold; white-space: nowrap; }
            .p-owner { top: 235px; } .p-parent { top: 285px; } .p-hld { top: 335px; } .p-ward { top: 385px; } .p-road { top: 435px; }
            .p-qr { position: absolute; z-index: 20; left: 678px; top: 220px; width: 185px; }
        }
        #print-zone { display: none; }
    </style>
</head>
<body onload="initApp()">

<div id="main-content" class="hidden no-print max-w-5xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
        <h1 class="text-xl font-bold text-indigo-400">2B Communication</h1>
        <div class="flex gap-4 items-center">
            <span id="user-display" class="text-[10px] bg-slate-800 px-3 py-1 rounded"></span>
            <button onclick="logout()" class="text-red-400 text-xs font-bold">লগআউট</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden space-y-4 mb-6">
        <div class="ui-card p-4 border-l-4 border-indigo-500">
            <h2 class="text-sm font-bold text-indigo-300 uppercase mb-4">অ্যাডমিন কন্ট্রোল</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="bg-slate-800 p-2 rounded text-center">
                    <p class="text-[10px] text-indigo-400">ID Template (id.png)</p>
                    <input type="file" id="idFile" class="text-xs w-full">
                </div>
                <div class="bg-slate-800 p-2 rounded text-center">
                    <p class="text-[10px] text-indigo-400">Plate Template (plate.png)</p>
                    <input type="file" id="plateFile" onchange="loadPlate(this)" class="text-xs w-full">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                <input type="text" id="new-user" placeholder="User ID">
                <input type="text" id="new-pass" placeholder="Password">
                <button onclick="createUser()" class="bg-indigo-600 rounded-lg text-xs font-bold py-2">Create User</button>
            </div>
        </div>
    </div>

    <div class="ui-card p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input type="hidden" id="edit-id">
            <input type="text" id="owner" placeholder="মালিকের নাম">
            <input type="text" id="parent" placeholder="পিতা/স্বামীর নাম">
            <input type="text" id="hld" placeholder="হোল্ডিং নং">
            <input type="text" id="ward" placeholder="ওয়ার্ড নং">
            <textarea id="road" placeholder="ঠিকানা" class="md:col-span-2 h-16"></textarea>
        </div>
        <button id="save-btn" onclick="saveData()" class="w-full bg-indigo-600 mt-4 py-3 rounded-lg font-bold">ডাটা সেভ করুন</button>
    </div>

    <div id="admin-btns" class="hidden grid grid-cols-2 gap-4 mb-6">
        <button onclick="buildZip()" class="bg-slate-700 py-3 rounded-lg font-bold border border-slate-600">📂 SVG জিপ ডাউনলোড</button>
        <button onclick="window.print()" class="bg-blue-600 py-3 rounded-lg font-bold">🖨️ প্রিন্ট ভিউ</button>
    </div>

    <div id="list" class="space-y-1"></div>
</div>

<div id="print-zone"></div>

<script>
    const firebaseConfig = { databaseURL: "https://b-system-73a7f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let entries = [], currentUser = sessionStorage.getItem('user_2b'), plateImg = "";

    function loadPlate(input) {
        if (input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => { plateImg = e.target.result; renderPrint(); };
            r.readAsDataURL(input.files[0]);
        }
    }

    function initApp() {
        database.ref('users').on('value', (s) => {
            const users = s.val() || { "admin": { pass: "forhad786" } };
            if (currentUser && users[currentUser]) {
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = currentUser.toUpperCase();
                if(currentUser === 'admin') {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('admin-btns').classList.remove('hidden');
                }
                syncData();
            } else {
                const id = prompt("ID:").toLowerCase().trim();
                const p = prompt("Pass:");
                if(id && users[id] && users[id].pass === p) {
                    sessionStorage.setItem('user_2b', id);
                    location.reload();
                } else { alert("ভুল তথ্য!"); location.reload(); }
            }
        });
    }

    function syncData() {
        database.ref('entries').on('value', (s) => {
            const val = s.val();
            entries = val ? Object.keys(val).map(id => ({...val[id], id})) : [];
            renderList();
        });
    }

    function saveData() {
        const d = { owner: document.getElementById('owner').value, parent: document.getElementById('parent').value, hld: document.getElementById('hld').value, ward: document.getElementById('ward').value, road: document.getElementById('road').value, user: currentUser };
        if(!d.owner) return;
        database.ref('entries').push(d);
        ['owner','parent','hld','ward','road'].forEach(k => document.getElementById(k).value = "");
    }

    function renderList() {
        const list = (currentUser === 'admin') ? entries : entries.filter(e => e.user === currentUser);
        document.getElementById('list').innerHTML = list.slice().reverse().map(e => `
            <div class="ui-card p-3 flex justify-between items-center text-xs mb-1">
                <div><p class="font-bold text-indigo-300">${e.owner}</p><p>${e.hld}</p></div>
                <button onclick="database.ref('entries/${e.id}').remove()" class="text-red-500">×</button>
            </div>`).join('');
    }

    async function buildZip() {
        const zip = new JSZip();
        for(let d of entries) {
            // ইলাস্ট্রেটর ফ্রেন্ডলি একদম সহজ SVG কোড
            const svg = `<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="242.36" height="153.07" viewBox="0 0 242.36 153.07">
    <rect width="242.36" height="153.07" fill="none" stroke="#000000"/>
    <text transform="matrix(1 0 0 1 70 58)" font-family="'Arial-BoldMT'" font-size="9">${d.owner}</text>
    <text transform="matrix(1 0 0 1 70 72)" font-family="'ArialMT'" font-size="9">${d.parent}</text>
    <text transform="matrix(1 0 0 1 70 86)" font-family="'Arial-BoldMT'" font-size="9">${d.hld}</text>
    <text transform="matrix(1 0 0 1 70 100)" font-family="'ArialMT'" font-size="9">${d.ward}</text>
    <text transform="matrix(1 0 0 1 70 114)" font-family="'ArialMT'" font-size="8">${d.road}</text>
</svg>`;
            zip.file(`${d.hld.replace(/\//g,'-')}.svg`, svg);
        }
        zip.generateAsync({type:"blob"}).then(c => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(c); a.download = "Fixed_SVG.zip"; a.click();
        });
    }

    function renderPrint() {
        if(!plateImg) return;
        document.getElementById('print-zone').innerHTML = entries.map(e => `
            <div class="page"><img src="${plateImg}" class="bg-template">
                <div class="plate-info p-owner">${e.owner}</div>
                <div class="plate-info p-parent">${e.parent}</div>
                <div class="plate-info p-hld">${e.hld}</div>
                <div class="plate-info p-ward">${e.ward}</div>
                <div class="plate-info p-road">${e.road}</div>
            </div>`).join('');
    }

    function logout() { sessionStorage.removeItem('user_2b'); location.reload(); }
    function createUser() { const u = document.getElementById('new-user').value.toLowerCase(); const p = document.getElementById('new-pass').value; database.ref('users/'+u).set({pass:p, status:'active'}); }
</script>
</body>
</html>
